# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

## Bind Windows To Workspaces
windowrule = match:class Alacritty, match:title Alacritty, workspace 1

windowrule = match:class firefox, match:title "Mozilla Firefox", workspace 2

windowrule = match:class heroic, match:title "Heroic Games Launcher", workspace 3
windowrule = match:class steam, match:title Steam, workspace 3

# Proton / Steam games
windowrule = match:class ^steam_app\., workspace 3
windowrule = match:class ^steam_app\., monitor DP-1

## Floating Windows + Sizing

# Calculator
windowrule {
  name = galculator-float
  match:class galculator
  match:title galculator
  float = on
  size = 300 450
}

# Bluetooth Manager
windowrule {
  name = blueman-float
  match:class blueman-manager
  match:title "Bluetooth Devices"
  float = on
  size = 530 400
}

# Network Connection Editor
windowrule {
  name = nm-connection-float
  match:class nm-connection-editor
  float = on
  size = 530 400
}

# Thunar File Transfer
windowrule {
  name = thunar-progress-float
  match:class thunar
  match:title "File Operation Progress"
  float = on
  size = 420 110
}

# Firefox Download Dialogue
windowrule {
  name = firefox-save-dialog
  match:class xdg-desktop-portal-gtk
  match:title "Enter name of file to save to…"
  float = on
  size = 1000 600
}

# Volume Control (pavucontrol)
windowrule {
  name = pavucontrol-float
  match:class org.pulseaudio.pavucontrol
  float = on
  size = 1000 600
}

# Bitwarden Unlock (Firefox extension)
windowrule {
  name = bitwarden-unlock
  match:class firefox
  match:title "Extension: (Bitwarden Password Manager) - Bitwarden — Mozilla Firefox"
  float = on
  size = 400 580
  center = on
}

## Steam Windows

# Friends List
windowrule {
  name = steam-friends
  match:class steam
  match:title "Friends List"
  float = on
  size = 350 750
  center = on
}

# Steam Settings
windowrule {
  name = steam-settings
  match:class steam
  match:title "Steam Settings"
  float = on
  size = 1200 922
  center = on
}

# Add Non-Steam Game
windowrule {
  name = steam-add-nonsteam
  match:class steam
  match:title "Add Non-Steam Game"
  float = on
  size = 800 600
  center = on
}

# Add Steam Library Folder
windowrule {
  name = steam-library-folder
  match:class Steam
  match:title "Create or select new Steam library folder"
  float = on
  size = 800 600
  center = on
}

## Global Rules

# Ignore maximize requests from apps
windowrule = match:class .*, suppressevent maximize

# Fix some dragging issues with XWayland
windowrule = match:class ^$, match:title ^$, match:xwayland 1, nofocus
